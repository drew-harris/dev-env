# [ui.colors]
# "selected" = { bg = "#52c8ff", fg = "#000000" }
#
[ui.theme]
light = "light"

# [ui.tracer]
# enabled = true

[preview]
show_at_start = false

[revisions]
log_batching = true
# template = 'builtin_log_oneline' # overrides jj's templates.log
# template = 'builtin_log_comfortable' # overrides jj's templates.log
#
# Set default to be the "current branch only"
# revset = "current_branch()"

# Legacy custom_commands migrated to [[actions]] + [[bindings]] below

[[actions]]
name = "branch-switcher"
desc = "switch working copy to bookmark"
lua = '''
local log_revset, revset_err = jj("config", "get", "revsets.log")
if revset_err then
  log_revset = "present(@) | ancestors(immutable_heads().., 2) | trunk()"
else
  log_revset = log_revset:gsub("%s+$", "")
end

local output, list_err = jj("bookmark", "list", "-r", log_revset, "-T", "name ++ \"\\n\"")
if list_err then
  flash({ text = "Failed to list bookmarks: " .. list_err, error = true, sticky = true })
  return
end

local options = split_lines(output)
if #options == 0 then
  flash({ text = "No bookmarks in default jj log revset", error = true })
  return
end

local seen = {}
local filtered = {}
for _, option in ipairs(options) do
  if option ~= "" and not seen[option] then
    seen[option] = true
    table.insert(filtered, option)
  end
end

table.sort(filtered)

local selected = choose({
  title = "Switch to branch",
  options = filtered,
  filter = true,
})
if not selected then
  return
end

local _, new_err = jj("new", selected)
if new_err then
  flash({ text = "Switch failed: " .. new_err, error = true, sticky = true })
  return
end

revset.set("current_branch()")
revisions.refresh({ keep_selections = false })
flash("Switched to " .. selected)
'''

[[actions]]
name = "revset-normal"
desc = "toggle between default log and current branch"
lua = '''
local log_revset, revset_err = jj("config", "get", "revsets.log")
if revset_err then
  log_revset = "present(@) | ancestors(immutable_heads().., 2) | trunk()"
else
  log_revset = log_revset:gsub("^%s+", ""):gsub("%s+$", "")
end

local branch_revset = "current_branch()"
local current = revset.current()
if current then
  current = current:gsub("^%s+", ""):gsub("%s+$", "")
end

if current == branch_revset then
  revset.set(log_revset)
  flash("Revset set to default jj log")
else
  revset.set(branch_revset)
  flash("Revset set to current_branch()")
end

revisions.refresh({ keep_selections = false })
'''

[[actions]]
name = "diff"
desc = "open difff for selected change"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

local _, err = jj("util", "exec", "difff", id)
if err then
  flash({ text = "Diff failed: " .. err, error = true, sticky = true })
  return
end
'''

[[actions]]
name = "diffedit"
desc = "diffedit selected change with zededit"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

local _, err = jj("diffedit", "-r", id, "--tool", "zededit")
if err then
  flash({ text = "Diffedit failed: " .. err, error = true, sticky = true })
  return
end

revisions.refresh({ keep_selections = true })
flash("Diffedit complete")
'''

[[actions]]
name = "open-pr"
desc = "open PR for selected change"
lua = '''
local _, err = jj("pr")
if err then
  flash({ text = "PR failed: " .. err, error = true, sticky = true })
  return
end

flash("Opened PR")
'''

[[actions]]
name = "pick-commit"
desc = "interactive commit with gitpatch"
lua = '''
local _, err = jj_interactive("commit", "-i", "--tool", "gitpatch")
if err then
  flash({ text = "Commit failed: " .. err, error = true, sticky = true })
  return
end

revisions.refresh({ keep_selections = false })
flash("Committed")
'''

[[actions]]
name = "new-main"
desc = "create new change on main"
lua = '''
local _, err = jj("new", "main")
if err then
  flash({ text = "New main failed: " .. err, error = true, sticky = true })
  return
end

revisions.refresh({ keep_selections = false })
flash("Created new change on main")
'''

[[actions]]
name = "new-after-selected"
desc = "create new change after selected (no edit)"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

local _, err = jj("new", "-A", id, "--no-edit")
if err then
  flash({ text = "New after failed: " .. err, error = true, sticky = true })
  return
end

revisions.refresh({ keep_selections = true })
flash("Created new change after " .. id)
'''

[[actions]]
name = "edit-file"
desc = "open selected file in zed"
lua = '''
local file = context.file()
if not file then
  flash({ text = "No file selected", error = true })
  return
end

local _, open_err = jj("util", "exec", "open-in-zed", file)
if open_err then
  flash({ text = "Open failed: " .. open_err, error = true, sticky = true })
  return
end

flash("Opened " .. file)
'''

[[actions]]
name = "rebase-all-prs"
desc = "rebase all mutable commits onto main"
lua = '''
local _, err = jj("rebase", "-r", "mutable() & mine()", "-d", "main")
if err then
  flash({ text = "Rebase failed: " .. err, error = true, sticky = true })
  return
end

revisions.refresh({ keep_selections = false })
flash("Rebased all PRs onto main")
'''

[[bindings]]
action = "rebase-all-prs"
seq = ["\\", "R"]
scope = "revisions"
desc = "rebase all prs onto main"

[[bindings]]
action = "branch-switcher"
key = ";"
scope = "revisions"
desc = "switch branch"

[[bindings]]
action = "revset-normal"
seq = ["\\", "r"]
scope = "revisions"
desc = "toggle revset"

[[bindings]]
action = "diff"
key = "O"
scope = "revisions"
desc = "open difff"

[[bindings]]
action = "diffedit"
key = "D"
scope = "revisions"
desc = "diffedit with zededit"

[[bindings]]
action = "open-pr"
key = "P"
scope = "revisions"
desc = "open PR"

[[bindings]]
action = "pick-commit"
key = "C"
scope = "revisions"
desc = "interactive commit"

[[bindings]]
action = "new-after-selected"
key = "N"
scope = "revisions"
desc = "new change after selected"

[[bindings]]
action = "edit-file"
key = "e"
scope = "revisions.details"
desc = "edit file"
